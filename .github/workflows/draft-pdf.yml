name: Draft PDF

on:
  push:
    branches: ["main", "apr-fixes"]
    paths:
      - "paper.md"
      - "paper.bib"
  pull_request:
    branches: ["main"]
    paths:
      - "paper.md"
      - "paper.bib"

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper Draft
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Verify paper files exist
        run: |
          test -f paper.md || (echo "paper.md not found" && exit 1)
          test -f paper.bib || (echo "paper.bib not found" && exit 1)
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@v0.2.0
        with:
          journal: joss
          paper-path: paper.md
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper-draft
          path: paper.pdf
          retention-days: 30
